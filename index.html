


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bozzy Restaurant</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar">

        <div class="container">

            <a href="#" class="logo">Bozzy</a>

            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#">Contact</a></li>
            </ul>

        </div>

    </nav>

    <!-- Hero Section -->

    <header class="hero">

        <div class="hero-content">

            <p>Delicious food in Cambodia</p>

            <a href="#" class="btn">Order Now</a>

        </div>
